[tool.poetry]
name = "content-lab-storage"
version = "0.1.0"
description = "MinIO/S3 object storage client and helpers"
authors = ["Ryan <you@example.com>"]
packages = [{ include = "content_lab_storage", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"
boto3 = "^1.39.0"
pydantic = "^2.7.0"
content-lab-shared = {path = "../shared/py", develop = true}

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.0"
mypy = "^1.10.0"
ruff = "^0.4.10"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
extend-select = ["I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["content_lab_storage", "content_lab_shared"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "integration: exercises the client against a live S3-compatible endpoint",
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
