[tool.poetry]
name = "content-lab-assets"
version = "0.1.0"
description = "Asset registry: cataloging, deduplication, and embedding lookup"
authors = ["Ryan <you@example.com>"]
packages = [{ include = "content_lab_assets", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"
sqlalchemy = "^2.0.30"
psycopg = {extras = ["binary"], version = "^3.2.0"}
content-lab-shared = {path = "../shared/py", develop = true}
content-lab-core = {path = "../core", develop = true}

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.0"
mypy = "^1.10.0"
ruff = "^0.4.10"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
extend-select = ["I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["content_lab_assets", "content_lab_core", "content_lab_shared"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
